spring:
  docker:
    compose:
      enabled: false
  application:
    name: virtual-demo
  threads:
    virtual:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5432/virtual_demo_db
    username: user
    password: password
    hikari:
      maximum-pool-size: 200
      minimum-idle: 100
clients:
  inventory:
    url: http://dummy-inventory
    timeout: 30s
  payment:
    url: http://dummy-payment
    timeout: 30s
